<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Instagram Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="post">
        <div class="post-header">
            <i class="fa-brands fa-html5"></i>
            <div class="header-titulo">
                <span>HTML5</span>
                <p>Rigoberto</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>

        <div class="post-img">
            <img src="https://picsum.photos/472/350">
        </div>  

        <div class="post-body">
            <div class="body-icons">
                <i class="fa-regular fa-heart"></i>
                <i class="fa-regular fa-comment"></i>
                <i class="fa-regular fa-paper-plane"></i>

                <i class="fa-regular fa-bookmark"></i>
            </div>
            <div class="body-description">
                <span>Liked by <b>4GeeksAcademy, html5, Web </b> and <b> 100,000 others </b> </span>

                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Cupiditate, ut est inventore similique accusamus iure harum in quos, cum quod, eaque tenetur quisquam laboriosam nulla fugiat et minus deleniti dolor.</p>
            </div>
        </div>



    </div>
</body>
</html>
